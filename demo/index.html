<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Impact Analysis Propagation Validation</title>
<style>

:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
  --border: #30363d; --text: #e6edf3; --text2: #8b949e;
  --accent: #58a6ff; --green: #3fb950;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; padding: 32px; line-height: 1.5; }
.container { max-width: 900px; margin: 0 auto; }
h1 { color: var(--accent); font-size: 24px; margin-bottom: 8px; }
.subtitle { color: var(--text2); margin-bottom: 32px; }
.repo-list { display: flex; flex-direction: column; gap: 12px; }
.repo-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: var(--text); transition: border-color 0.2s; }
.repo-card:hover { border-color: var(--accent); }
.repo-card .name { font-size: 16px; font-weight: 600; }
.repo-card .arrow { color: var(--text2); font-size: 20px; }
.repo-meta { display: flex; gap: 20px; margin-top: 6px; flex-wrap: wrap; }
.meta-item { color: var(--text2); font-size: 12px; }
.meta-item span { color: var(--text); font-weight: 600; }
.progress-note { color: var(--text2); font-size: 12px; margin-top: 4px; }
.export-all { margin-top: 24px; text-align: center; }
.export-all button { padding: 10px 28px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; font-size: 14px; }
.export-all button:hover { border-color: var(--accent); }

</style>
</head>
<body>
<div class="container">
  <h1>&#128203; Change Impact Analysis Propagation Validation</h1>
  <p class="subtitle">Select a repository to review and validate the change propagation results.</p>
  <div class="repo-list">
    <a class="repo-card" href="repo_mauricioaniche_ck.html">
      <div>
        <div class="name">mauricioaniche/ck</div>
        <div class="repo-meta">
          <div class="meta-item">Vertices: <span>402</span></div>
          <div class="meta-item">Total Impact: <span>1896434.48</span></div>
          <div class="meta-item">Max Score: <span>260058.60</span></div>
          <div class="meta-item">Algorithm: <span>Link Communities</span></div>
        </div>
        <div class="progress-note" id="prog_mauricioaniche_ck">Loading progress…</div>
      </div>
      <span class="arrow">&#8594;</span>
    </a>
  </div>
  <div class="export-all">
    <button onclick="exportAllCSV()">&#128229; Export ALL validations (CSV)</button>
  </div>
</div>
<script>
document.querySelectorAll(".repo-card").forEach(card => {
  const name   = card.querySelector(".name").textContent.replace(/\//g, "_");
  const prefix = 'ocpa_vote_' + name + '__';
  let count = 0;
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith(prefix) && !k.endsWith('__comment')) count++;
  }
  const el = card.querySelector(".progress-note");
  if (count > 0) {
    el.textContent = count + ' validation' + (count > 1 ? 's' : '') + ' submitted';
    el.style.color = '#3fb950';
  } else {
    el.textContent = 'No validations yet';
  }
});

function exportAllCSV() {
  const rows = [['Email','Repository','Source_Class','Affected_Class','Rank','Score','CoChange','Distance','Validation','Comment','Timestamp']];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith('ocpa_vote_') && !key.endsWith('__comment')) {
      try {
        const d = JSON.parse(localStorage.getItem(key));
        rows.push([ d.Email||'', d.Repository||'', d.Source_Class||'', d.Affected_Class||'', d.Rank||'', d.Score||'', d.CoChange||'', d.Distance||'', d.Validation||d.vote||'', d.Comment||'', d.Timestamp||'' ]);
      } catch(e) {}
    }
  }
  const csv  = rows.map(r => r.map(c => '"' + String(c).replace(/"/g,'""')+'"').join(",")).join("\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const a    = document.createElement("a");
  a.href     = URL.createObjectURL(blob);
  a.download = 'ocpa_validacoes_todas.csv';
  a.click();
}
</script>
</body>
</html>
